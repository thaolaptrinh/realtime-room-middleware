name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tidy
        run: go mod tidy

      - name: Format check
        run: test -z "$(gofmt -l .)" || { echo "Run make fmt"; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Build
        run: make build

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Config check
        run: go run ./cmd/config-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
