# Secrets example for distributed mode
#
# THIS FILE CONTAINS PLACEHOLDER VALUES ONLY.
# Do NOT commit real secrets. Copy to secrets.yaml and fill in real values.
# Add secrets.yaml to .gitignore.
#
apiVersion: v1
kind: Secret
metadata:
  name: realtime-secrets
  namespace: realtime
type: Opaque
stringData:
  # Example placeholder values — replace before deploying
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"
  SESSION_SIGNING_KEY: "REPLACE_WITH_SESSION_SIGNING_KEY"
  # Add other secrets as needed. Do not store real values here.
