services:
  gateway:
    build:
      context: ../..
      dockerfile: deployments/dev/gateway.Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config/dev.yaml:/app/config.yaml:ro
    depends_on:
      - game-server
    environment:
      - CONFIG_PATH=/app/config.yaml

  game-server:
    build:
      context: ../..
      dockerfile: deployments/dev/game-server.Dockerfile
    ports:
      - "9000:9000/udp"
    volumes:
      - ./config/dev.yaml:/app/config.yaml:ro
    environment:
      - CONFIG_PATH=/app/config.yaml

